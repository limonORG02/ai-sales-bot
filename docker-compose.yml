version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: ai-sales-bot-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: super_secret_password_123
      POSTGRES_DB: ai_sales_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
